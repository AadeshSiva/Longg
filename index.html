<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" href="./icon.svg">
    <title>Longg</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap');

        :root {
            --tb: 58px;
            --red: #3636FF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #f8f8f8;
            font-family: 'DM Sans', sans-serif;
            overscroll-behavior: none;
            position: fixed;
        }

        #toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--tb);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            padding-top: env(safe-area-inset-top);
            z-index: 300;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.07);
        }

        .logo-svg {
            height: 28px;
            width: auto;
            flex-shrink: 0;
            user-select: none;
            display: block;
        }

        .tools {
            display: flex;
            align-items: center;
            gap: 6px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            padding-right: 2px;
        }

        .tools::-webkit-scrollbar {
            display: none;
        }

        .tool-btn {
            flex-shrink: 0;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: #f0f0f0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, box-shadow 0.15s;
            -webkit-appearance: none;
            touch-action: manipulation;
        }

        .tool-btn:active {
            opacity: 0.75;
        }

        .tool-btn.active {
            background: var(--red);
        }

        .tool-btn.active svg path,
        .tool-btn.active svg rect,
        .tool-btn.active svg circle {
            stroke: #fff;
        }

        .tool-btn.active .t-icon {
            color: #fff;
        }

        .t-icon {
            font-weight: 700;
            font-size: 17px;
            color: #333;
            line-height: 1;
        }

        #draw-sheet {
            position: fixed;
            bottom: -130px;
            left: 0;
            right: 0;
            background: #fff;
            border-radius: 18px 18px 0 0;
            box-shadow: 0 -4px 24px rgba(100, 100, 100, 0.074);
            padding: 14px 20px 28px;
            padding-bottom: calc(28px + env(safe-area-inset-bottom));
            z-index: 250;
            transition: bottom 0.28s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        #draw-sheet.open {
            bottom: 0;
        }

        .sheet-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sheet-label {
            font-size: 13px;
            color: #888;
            width: 48px;
            flex-shrink: 0;
        }

        #draw-color {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 3px solid #fff;
            box-shadow: 0 0 0 1.5px #ddd;
            cursor: pointer;
            -webkit-appearance: none;
            flex-shrink: 0;
            padding: 0;
        }

        #draw-color::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        #draw-color::-webkit-color-swatch {
            border: none;
            border-radius: 50%;
        }

        #brush-sz {
            flex: 1;
            accent-color: var(--red);
            height: 4px;
            cursor: pointer;
        }

        .sheet-btn {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 1.5px solid #e0e0e0;
            background: #fafafa;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: #444;
            cursor: pointer;
            text-align: center;
            touch-action: manipulation;
        }

        .sheet-btn.active {
            background: #222;
            color: #fff;
            border-color: #222;
        }

        .sheet-handle {
            width: 40px;
            height: 4px;
            background: #ddd;
            border-radius: 2px;
            margin: 0 auto 6px;
            cursor: pointer;
        }

        #workspace {
            position: fixed;
            top: var(--tb);
            left: 0;
            right: 0;
            bottom: 0;
            touch-action: none;
            overflow: hidden;
            background: #f8f8f8;
        }

        #grid-canvas,
        #draw-canvas,
        #sel-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #sel-canvas {
            z-index: 2;
        }

        #draw-canvas {
            z-index: 1;
        }

        #grid-canvas {
            z-index: 0;
        }

        #el-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            pointer-events: none;
            will-change: transform;
            z-index: 3;
        }

        .el {
            position: absolute;
            pointer-events: all;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        .el-text {
            font-size: 18px;
            color: #111;
            min-width: 20px;
            min-height: 28px;
            padding: 4px 6px;
            border-radius: 4px;
            line-height: 1.5;
            white-space: pre;
            cursor: default;
        }

        .el-text.editing {
            outline: none;
            border-bottom: 2.5px solid var(--red);
            background: rgba(230, 48, 48, 0.04);
            cursor: text;
        }

        .el-img {
            position: relative;
            display: inline-block;
        }

        .el-img img {
            display: block;
            width: 160px;
            height: auto;
            border-radius: 8px;
            pointer-events: none;
            -webkit-user-drag: none;
        }

        .del-btn {
            position: absolute;
            top: -14px;
            right: -14px;
            width: 26px;
            height: 26px;
            background: #111;
            color: #fff;
            border: 2.5px solid #fff;
            border-radius: 50%;
            font-size: 15px;
            line-height: 22px;
            text-align: center;
            cursor: pointer;
            touch-action: manipulation;
            display: none;
            z-index: 30;
            font-weight: 700;
        }

        .el:hover>.del-btn {
            display: block;
        }

        .el.selected>.del-btn {
            display: block;
        }

        #mode-hint {
            position: fixed;
            bottom: calc(20px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.74);
            color: #fff;
            font-size: 13px;
            padding: 9px 20px;
            border-radius: 22px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.22s;
            white-space: nowrap;
            z-index: 400;
        }

        #mode-hint.show {
            opacity: 1;
        }

        #save-toast {
            position: fixed;
            top: calc(var(--tb) + 12px);
            left: 50%;
            transform: translateX(-50%);
            background: #111;
            color: #fff;
            font-size: 13px;
            padding: 9px 20px;
            border-radius: 22px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            white-space: nowrap;
            z-index: 500;
        }

        #save-toast.show {
            opacity: 1;
        }

        #pan-info {
            position: fixed;
            bottom: calc(8px + env(safe-area-inset-bottom));
            right: 14px;
            font-size: 10px;
            color: #bbb;
            pointer-events: none;
            z-index: 200;
        }

        #footer {
            position: fixed;
            bottom: calc(8px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: #999;
            pointer-events: none;
            z-index: 9999;
            white-space: nowrap;
            user-select: none;
        }

        #footer a {
            color: var(--red);
            text-decoration: none;
            font-weight: 600;
            pointer-events: all;
        }

        #footer a:hover {
            text-decoration: underline;
        }

        #autosave-dot {
            position: fixed;
            top: calc(var(--tb) + 8px);
            right: 10px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ccc;
            z-index: 400;
            pointer-events: none;
            transition: background 0.3s;
        }

        #autosave-dot.saving {
            background: var(--red);
        }

        #autosave-dot.saved {
            background: #4caf50;
        }

        #stroke-del-btn {
            position: fixed;
            bottom: calc(18px + env(safe-area-inset-bottom));
            left: 18px;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 22px;
            padding: 11px 22px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
            z-index: 500;
            display: none;
            touch-action: manipulation;
            transition: opacity 0.15s, transform 0.15s;
        }

        #stroke-del-btn.show {
            display: block;
        }

        #stroke-del-btn:active {
            opacity: 0.7;
            transform: scale(0.96);
        }

        #done-btn {
            position: fixed;
            bottom: calc(18px + env(safe-area-inset-bottom));
            right: 18px;
            background: var(--red);
            color: #fff;
            border: none;
            border-radius: 22px;
            padding: 11px 24px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            z-index: 500;
            display: none;
            touch-action: manipulation;
            letter-spacing: 0.01em;
            transition: opacity 0.15s, transform 0.15s;
        }

        #done-btn.show {
            display: block;
        }

        #done-btn:active {
            opacity: 0.8;
            transform: scale(0.96);
        }

        .tool-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }

        #undo-redo-wrap {
            position: fixed;
            top: calc(var(--tb) + 10px);
            left: 12px;
            display: flex;
            gap: 6px;
            z-index: 400;
        }

        #undo-redo-wrap button {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.12);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            touch-action: manipulation;
            transition: opacity 0.15s, background 0.15s;
        }

        #undo-redo-wrap button:active {
            background: #f0f0f0;
        }

        #undo-redo-wrap button:disabled {
            opacity: 0.28;
            cursor: default;
        }

        /* music icon active dot */
        #btn-music.has-song::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--red);
            border-radius: 50%;
            top: 4px;
            right: 4px;
            border: 2px solid #fff;
        }

        #btn-music {
            position: relative;
        }

        /* music popup */
        #music-popup {
            position: fixed;
            inset: 0;
            z-index: 8000;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }

        #music-popup.show {
            display: flex;
        }

        #music-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
        }

        #music-card {
            position: relative;
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 24px 24px 0 0;
            padding: 20px 24px 36px;
            padding-bottom: calc(36px + env(safe-area-inset-bottom));
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .music-handle {
            width: 36px;
            height: 4px;
            background: #ddd;
            border-radius: 2px;
            margin: 0 auto -8px;
        }

        #music-song-row {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        #music-icon-wrap {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: var(--red);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #music-song-info {
            flex: 1;
            overflow: hidden;
        }

        #music-song-name {
            font-size: 16px;
            font-weight: 600;
            color: #111;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #music-song-sub {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }

        #music-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }

        .mc-btn {
            background: none;
            border: none;
            cursor: pointer;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.15s;
        }

        .mc-btn:active {
            background: #f0f0f0;
        }

        #mc-play {
            width: 56px;
            height: 56px;
            background: var(--red);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px rgba(54, 54, 255, 0.35);
            touch-action: manipulation;
        }

        #mc-play:active {
            opacity: 0.8;
        }

        #music-progress-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #music-progress {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: #eee;
            border-radius: 2px;
            accent-color: var(--red);
            cursor: pointer;
        }

        .music-time {
            font-size: 11px;
            color: #999;
            width: 34px;
            flex-shrink: 0;
            text-align: center;
        }

        #music-actions {
            display: flex;
            gap: 10px;
        }

        .ma-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: 1.5px solid #e8e8e8;
            background: #fafafa;
            font-family: "DM Sans", sans-serif;
            font-size: 14px;
            color: #444;
            cursor: pointer;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .ma-btn:active {
            background: #f0f0f0;
        }

        #ma-remove {
            color: #e63030;
            border-color: #fde0e0;
            background: #fff5f5;
        }

        #ma-remove:active {
            background: #fde0e0;
        }
    </style>
</head>

<body>

    <div id="toolbar">
        <img src="Longg.svg" alt="Longg" class="logo-svg">
        <div class="tools">
            <button class="tool-btn active" id="btn-grab" title="Pan">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 11V8a2 2 0 0 0-4 0v3" />
                    <path d="M14 10V7a2 2 0 0 0-4 0v3" />
                    <path d="M10 10.5V5a2 2 0 0 0-4 0v9" />
                    <path d="M6 14s-1-1.5-2.5-1.5S1 14 1 15.5C1 19 5 21 9 22h2c4 0 7-2 7-6V11a2 2 0 0 0-4 0" />
                </svg>
            </button>
            <button class="tool-btn" id="btn-draw" title="Draw">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 20h9" />
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                </svg>
            </button>

            <button class="tool-btn" id="btn-text" title="Text">
                <span class="t-icon">T</span>
            </button>
            <button class="tool-btn" id="btn-img" title="Image">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                    <circle cx="8.5" cy="8.5" r="1.5" />
                    <path d="m21 15-5-5L5 21" />
                </svg>
            </button>
            <input type="file" id="file-in" accept="image/*" style="display:none">
            <button class="tool-btn" id="btn-music" title="Add song">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 18V5l12-2v13" />
                    <circle cx="6" cy="18" r="3" />
                    <circle cx="18" cy="16" r="3" />
                </svg>
            </button>
            <input type="file" id="audio-in" accept="audio/*" style="display:none">
        </div>
    </div>

    <div id="workspace">
        <canvas id="grid-canvas"></canvas>
        <canvas id="draw-canvas"></canvas>
        <canvas id="sel-canvas"></canvas>
        <div id="el-layer"></div>
    </div>

    <div id="draw-sheet">
        <div class="sheet-handle" id="sheet-handle"></div>
        <div class="sheet-row">
            <span class="sheet-label">Color</span>
            <input type="color" id="draw-color" value="#e63030">
            <span class="sheet-label" style="text-align:right">Size</span>
            <input type="range" id="brush-sz" min="1" max="30" value="4">
        </div>
        <div class="sheet-row">
            <button class="sheet-btn" id="eraser-btn">⌫ Eraser</button>
            <button class="sheet-btn" id="clear-btn">✕ Clear last</button>
        </div>
    </div>

    <div id="mode-hint"></div>
    <div id="save-toast"></div>
    <button id="stroke-del-btn">Remove</button>
    <button id="done-btn">Done</button>
    <div id="pan-info">↓ 0px</div>
    <audio id="bg-audio" loop></audio>
    <div id="music-popup">
        <div id="music-overlay"></div>
        <div id="music-card">
            <div class="music-handle"></div>
            <div id="music-song-row">
                <div id="music-icon-wrap">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 18V5l12-2v13" />
                        <circle cx="6" cy="18" r="3" />
                        <circle cx="18" cy="16" r="3" />
                    </svg>
                </div>
                <div id="music-song-info">
                    <div id="music-song-name">No song loaded</div>
                    <div id="music-song-sub">Tap "Change song" to pick one</div>
                </div>
            </div>
            <div id="music-progress-wrap">
                <span class="music-time" id="music-cur">0:00</span>
                <input type="range" id="music-progress" min="0" max="100" value="0">
                <span class="music-time" id="music-dur">0:00</span>
            </div>
            <div id="music-controls">
                <button class="mc-btn" id="mc-back">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="1 4 1 10 7 10" />
                        <path d="M3.51 15a9 9 0 1 0 .49-3.5" />
                    </svg>
                </button>
                <button id="mc-play">
                    <svg id="mc-play-icon" width="22" height="22" viewBox="0 0 24 24" fill="#fff" stroke="none">
                        <polygon points="5,3 19,12 5,21" />
                    </svg>
                    <svg id="mc-pause-icon" width="22" height="22" viewBox="0 0 24 24" fill="#fff" stroke="none"
                        style="display:none">
                        <rect x="6" y="4" width="4" height="16" />
                        <rect x="14" y="4" width="4" height="16" />
                    </svg>
                </button>
                <button class="mc-btn" id="mc-fwd">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10" />
                        <path d="M20.49 15a9 9 0 1 1-.49-3.5" />
                    </svg>
                </button>
            </div>
            <div id="music-actions">
                <button class="ma-btn" id="ma-change">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="17 8 12 3 7 8" />
                        <line x1="12" y1="3" x2="12" y2="15" />
                    </svg>
                    Change song
                </button>
                <button class="ma-btn" id="ma-remove">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6" />
                        <path d="M19 6l-1 14H6L5 6" />
                        <path d="M10 11v6" />
                        <path d="M14 11v6" />
                        <path d="M9 6V4h6v2" />
                    </svg>
                    Remove
                </button>
            </div>
        </div>
    </div>
    <div id="footer">made by <a href="https://aadeshsiva.vercel.app/" target="_blank">@me</a></div>
    <div id="autosave-dot" title="Auto-save status"></div>
    <div id="undo-redo-wrap">
        <button id="btn-undo" title="Undo">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 7v6h6" />
                <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13" />
            </svg>
        </button>
        <button id="btn-redo" title="Redo">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 7v6h-6" />
                <path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13" />
            </svg>
        </button>
    </div>

    <script>
        let mode = null;
        let isErasing = false;
        let panX = 0, panY = 0;
        let zTop = 10;

        const strokes = [];
        let activeStroke = null;
        let selectedStroke = null;

        const workspace = document.getElementById('workspace');
        const drawCanvas = document.getElementById('draw-canvas');
        const gridCanvas = document.getElementById('grid-canvas');
        const selCanvas = document.getElementById('sel-canvas');
        const layer = document.getElementById('el-layer');
        const ctx = drawCanvas.getContext('2d');
        const gctx = gridCanvas.getContext('2d');
        const sctx = selCanvas.getContext('2d');
        const hint = document.getElementById('mode-hint');
        const panInfo = document.getElementById('pan-info');
        const drawSheet = document.getElementById('draw-sheet');
        const drawColor = document.getElementById('draw-color');
        const brushSz = document.getElementById('brush-sz');
        const eraserBtn = document.getElementById('eraser-btn');
        const clearBtn = document.getElementById('clear-btn');
        const btnGrab = document.getElementById('btn-grab');
        const btnDraw = document.getElementById('btn-draw');
        const btnText = document.getElementById('btn-text');
        const btnImg = document.getElementById('btn-img');
        const saveToast = document.getElementById('save-toast');
        const autosaveDot = document.getElementById('autosave-dot');
        const fileIn = document.getElementById('file-in');
        const doneBtn = document.getElementById('done-btn');
        const strokeDelBtn = document.getElementById('stroke-del-btn');
        const btnUndo = document.getElementById('btn-undo');
        const btnRedo = document.getElementById('btn-redo');

        function resizeCanvases() {
            const w = workspace.clientWidth, h = workspace.clientHeight;
            [drawCanvas, gridCanvas, selCanvas].forEach(c => { c.width = w; c.height = h; });
            selectedStroke = null;
            strokeDelBtn.classList.remove('show');
            redrawAll(); drawGrid(); drawSelection();
        }
        window.addEventListener('resize', () => setTimeout(resizeCanvases, 80));

        function drawGrid() {
            const w = gridCanvas.width, h = gridCanvas.height;
            gctx.clearRect(0, 0, w, h);
            const sp = 34;
            const ox = ((panX % sp) + sp) % sp;
            const oy = ((panY % sp) + sp) % sp;
            gctx.fillStyle = '#ccc';
            for (let x = ox; x < w; x += sp)
                for (let y = oy; y < h; y += sp) {
                    gctx.beginPath(); gctx.arc(x, y, 1.2, 0, Math.PI * 2); gctx.fill();
                }
        }

        function toWorld(sx, sy) { return [sx - panX, sy - panY]; }
        function toScreen(wx, wy) { return [wx + panX, wy + panY]; }

        function redrawAll() {
            ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
            for (const s of strokes) renderStroke(ctx, s);
            if (activeStroke) renderStroke(ctx, activeStroke);
        }

        function renderStroke(c, s) {
            if (s.points.length < 2) return;
            c.save();
            c.lineCap = 'round'; c.lineJoin = 'round'; c.lineWidth = s.width;
            if (s.eraser) {
                c.globalCompositeOperation = 'destination-out';
                c.strokeStyle = 'rgba(0,0,0,1)';
            } else {
                c.globalCompositeOperation = 'source-over';
                c.strokeStyle = s.color;
            }
            c.beginPath();
            const [x0, y0] = toScreen(s.points[0].x, s.points[0].y);
            c.moveTo(x0, y0);
            for (let i = 1; i < s.points.length; i++) {
                const [x, y] = toScreen(s.points[i].x, s.points[i].y);
                c.lineTo(x, y);
            }
            c.stroke(); c.restore();
        }

        function strokeBBox(s) {
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            for (const p of s.points) {
                if (p.x < minX) minX = p.x; if (p.y < minY) minY = p.y;
                if (p.x > maxX) maxX = p.x; if (p.y > maxY) maxY = p.y;
            }
            const pad = s.width / 2 + 2;
            return { x: minX - pad, y: minY - pad, w: maxX - minX + pad * 2, h: maxY - minY + pad * 2 };
        }

        const HANDLE_R = 14;

        function drawSelection() {
            sctx.clearRect(0, 0, selCanvas.width, selCanvas.height);
            if (!selectedStroke || selectedStroke.eraser) { selectedStroke = null; return; }
            const bb = strokeBBox(selectedStroke);
            const [sx, sy] = toScreen(bb.x, bb.y);
            const sw = bb.w, sh = bb.h;
            sctx.save();
            sctx.strokeStyle = '#3636FF';
            sctx.lineWidth = 1.5;
            sctx.setLineDash([5, 4]);
            sctx.strokeRect(sx, sy, sw, sh);
            sctx.setLineDash([]);
            const corners = [[sx, sy], [sx + sw, sy], [sx, sy + sh], [sx + sw, sy + sh]];
            for (const [cx, cy] of corners) {
                sctx.beginPath(); sctx.arc(cx, cy, HANDLE_R, 0, Math.PI * 2);
                sctx.fillStyle = '#fff'; sctx.fill();
                sctx.strokeStyle = '#3636FF'; sctx.lineWidth = 2; sctx.stroke();
            }
            sctx.restore();
        }

        function hitHandle(sx, sy) {
            if (!selectedStroke) return -1;
            const bb = strokeBBox(selectedStroke);
            const [bsx, bsy] = toScreen(bb.x, bb.y);
            const corners = [[bsx, bsy], [bsx + bb.w, bsy], [bsx, bsy + bb.h], [bsx + bb.w, bsy + bb.h]];
            for (let i = 0; i < corners.length; i++) {
                const dx = sx - corners[i][0], dy = sy - corners[i][1];
                if (Math.hypot(dx, dy) <= HANDLE_R + 6) return i;
            }
            return -1;
        }

        function hitStroke(sx, sy) {
            const [wx, wy] = toWorld(sx, sy);
            for (let i = strokes.length - 1; i >= 0; i--) {
                const s = strokes[i];
                if (s.eraser) continue;   // eraser strokes are not selectable
                const bb = strokeBBox(s);
                if (wx >= bb.x && wx <= bb.x + bb.w && wy >= bb.y && wy <= bb.y + bb.h) {
                    const thresh = Math.max(s.width / 2 + 8, 12);
                    for (let j = 1; j < s.points.length; j++) {
                        const p1 = s.points[j - 1], p2 = s.points[j];
                        if (distToSegment(wx, wy, p1.x, p1.y, p2.x, p2.y) <= thresh) return s;
                    }
                }
            }
            return null;
        }

        function distToSegment(px, py, ax, ay, bx, by) {
            const dx = bx - ax, dy = by - ay;
            const lenSq = dx * dx + dy * dy;
            if (lenSq === 0) return Math.hypot(px - ax, py - ay);
            let t = ((px - ax) * dx + (py - ay) * dy) / lenSq;
            t = Math.max(0, Math.min(1, t));
            return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
        }

        function applyPan(_, ny) {
            panX = 0;
            panY = Math.min(0, ny);
            layer.style.transform = `translate(0px,${panY}px)`;
            redrawAll(); drawGrid(); drawSelection();
            panInfo.textContent = `↓ ${Math.round(-panY)}px`;
        }

        const ptrs = {};
        let panOrigin = null, pinchBase = null, drawActive = false, tapDown = null;
        let strokeDrag = null, strokeResize = null;

        function wpos(e) {
            const r = workspace.getBoundingClientRect();
            return { x: e.clientX - r.left, y: e.clientY - r.top };
        }

        workspace.addEventListener('pointerdown', e => {
            e.preventDefault();
            workspace.setPointerCapture(e.pointerId);
            ptrs[e.pointerId] = wpos(e);
            const pids = Object.keys(ptrs);
            const pos = ptrs[e.pointerId];

            if (pids.length >= 2) {
                drawActive = false; activeStroke = null; strokeDrag = null; strokeResize = null;
                redrawAll();
                const vals = Object.values(ptrs);
                pinchBase = { cy: (vals[0].y + vals[1].y) / 2, panY };
                panOrigin = null;
                return;
            }

            tapDown = { x: pos.x, y: pos.y };

            if (mode === 'draw') {
                drawActive = true;
                const [wx, wy] = toWorld(pos.x, pos.y);
                activeStroke = {
                    color: isErasing ? '#000' : drawColor.value,
                    width: isErasing ? parseFloat(brushSz.value) * 3 : parseFloat(brushSz.value),
                    eraser: isErasing,
                    points: [{ x: wx, y: wy }]
                };
                return;
            }

            if (mode === null) {
                const h = hitHandle(pos.x, pos.y);
                if (h !== -1 && selectedStroke) {
                    const bb = strokeBBox(selectedStroke);
                    strokeResize = { origPoints: selectedStroke.points.map(p => ({ ...p })), bb, corner: h, sx: pos.x, sy: pos.y };
                    return;
                }
                const hit = hitStroke(pos.x, pos.y);
                if (hit && !hit.eraser) {
                    selectedStroke = hit;
                    strokeDrag = { origPoints: hit.points.map(p => ({ ...p })), sx: pos.x, sy: pos.y };
                    strokeDelBtn.classList.add('show');
                    drawSelection();
                    return;
                }
                selectedStroke = null; strokeDrag = null; strokeResize = null;
                strokeDelBtn.classList.remove('show');
                drawSelection();
                panOrigin = { y: pos.y, panY };
            }
        }, { passive: false });

        workspace.addEventListener('pointermove', e => {
            if (!(e.pointerId in ptrs)) return;
            const pos = wpos(e);
            ptrs[e.pointerId] = pos;
            const pids = Object.keys(ptrs);

            if (pids.length >= 2 && pinchBase) {
                const vals = Object.values(ptrs);
                const cy = (vals[0].y + vals[1].y) / 2;
                applyPan(0, pinchBase.panY + cy - pinchBase.cy);
                return;
            }

            if (mode === 'draw' && drawActive && activeStroke) {
                const [wx, wy] = toWorld(pos.x, pos.y);
                activeStroke.points.push({ x: wx, y: wy });
                redrawAll(); return;
            }

            if (strokeDrag && selectedStroke) {
                const dx = pos.x - strokeDrag.sx, dy = pos.y - strokeDrag.sy;
                selectedStroke.points = strokeDrag.origPoints.map(p => ({ x: p.x + dx, y: p.y + dy }));
                redrawAll(); drawSelection(); return;
            }

            if (strokeResize && selectedStroke) {
                const { origPoints, bb, corner, sx, sy } = strokeResize;
                const dx = pos.x - sx, dy = pos.y - sy;
                const anchors = [[bb.x + bb.w, bb.y + bb.h], [bb.x, bb.y + bb.h], [bb.x + bb.w, bb.y], [bb.x, bb.y]];
                const [ax, ay] = anchors[corner];
                const origCorners = [[bb.x, bb.y], [bb.x + bb.w, bb.y], [bb.x, bb.y + bb.h], [bb.x + bb.w, bb.y + bb.h]];
                const [ocx, ocy] = origCorners[corner];
                const [ncx, ncy] = toWorld(toScreen(ocx, ocy)[0] + dx, toScreen(ocx, ocy)[1] + dy);
                const scaleX = (Math.abs(ncx - ax) || 0.001) / (Math.abs(ocx - ax) || 1);
                const scaleY = (Math.abs(ncy - ay) || 0.001) / (Math.abs(ocy - ay) || 1);
                selectedStroke.points = origPoints.map(p => ({ x: ax + (p.x - ax) * scaleX, y: ay + (p.y - ay) * scaleY }));
                redrawAll(); drawSelection(); return;
            }

            if (panOrigin) applyPan(0, panOrigin.panY + pos.y - panOrigin.y);
        }, { passive: false });

        workspace.addEventListener('pointerup', e => {
            const pos = wpos(e);
            delete ptrs[e.pointerId];
            pinchBase = null;

            if (mode === 'draw' && drawActive && activeStroke) {
                if (activeStroke.points.length < 2) {
                    const p = activeStroke.points[0];
                    activeStroke.points.push({ x: p.x + 0.5, y: p.y + 0.5 });
                }
                strokes.push(activeStroke);
                activeStroke = null; drawActive = false;
                redrawAll(); pushHistory(); return;
            }

            if (strokeDrag || strokeResize) { strokeDrag = null; strokeResize = null; pushHistory(); return; }

            if (mode === 'text' && tapDown) {
                const dx = pos.x - tapDown.x, dy = pos.y - tapDown.y;
                if (Math.hypot(dx, dy) < 10) { addText(pos.x, pos.y); setMode(null); }
            }

            panOrigin = null; drawActive = false; tapDown = null;
        }, { passive: false });

        workspace.addEventListener('pointercancel', e => {
            delete ptrs[e.pointerId];
            pinchBase = null; panOrigin = null;
            drawActive = false; activeStroke = null; tapDown = null;
            strokeDrag = null; strokeResize = null;
            redrawAll();
        });

        workspace.addEventListener('pointerdown', () => {
            document.querySelectorAll('.el.selected').forEach(el => el.classList.remove('selected'));
            const active = document.querySelector('.el-text[contenteditable="true"]');
            if (active) active.blur();
        }, { capture: true, passive: true });

        let hintTimer;
        function showHint(msg) {
            clearTimeout(hintTimer);
            hint.textContent = msg;
            hint.classList.add('show');
            hintTimer = setTimeout(() => hint.classList.remove('show'), 2800);
        }

        function setMode(m) {
            if (m === 'grab') m = null;
            if (mode === 'draw' && m !== 'draw') drawSheet.classList.remove('open');
            mode = (mode === m && m !== null) ? null : m;
            if (mode !== null) { selectedStroke = null; strokeDelBtn.classList.remove('show'); drawSelection(); }
            btnGrab.classList.toggle('active', mode === null);
            btnDraw.classList.toggle('active', mode === 'draw');
            btnText.classList.toggle('active', mode === 'text');
            if (mode === 'draw') {
                doneBtn.classList.add('show');
                showHint('Tap draw button again to open tools');
            } else if (mode === 'text') {
                doneBtn.classList.remove('show');
                drawSheet.classList.remove('open');
                showHint('Tap anywhere to place text');
            } else {
                doneBtn.classList.remove('show');
                drawSheet.classList.remove('open');
                showHint('Tap a stroke to select');
            }
        }

        btnGrab.addEventListener('click', () => setMode('grab'));
        btnDraw.addEventListener('click', () => {
            if (mode === 'draw') {
                // already in draw mode — toggle sheet open/close
                drawSheet.classList.toggle('open');
            } else {
                setMode('draw');
                drawSheet.classList.add('open');  // open sheet on first click
            }
        });
        btnText.addEventListener('click', () => setMode('text'));

        eraserBtn.addEventListener('click', () => { isErasing = !isErasing; eraserBtn.classList.toggle('active', isErasing); });
        clearBtn.addEventListener('click', () => {
            if (strokes.length === 0) return;
            strokes.pop();   // remove only the most recent stroke
            if (selectedStroke && !strokes.includes(selectedStroke)) {
                selectedStroke = null;
                strokeDelBtn.classList.remove('show');
            }
            redrawAll(); drawSelection();
            pushHistory();
        });
        document.getElementById('sheet-handle').addEventListener('click', () => { drawSheet.classList.remove('open'); });

        strokeDelBtn.addEventListener('click', () => {
            if (selectedStroke) {
                const idx = strokes.indexOf(selectedStroke);
                if (idx !== -1) strokes.splice(idx, 1);
                selectedStroke = null;
                strokeDelBtn.classList.remove('show');
                redrawAll(); drawSelection(); pushHistory();
            }
        });

        doneBtn.addEventListener('click', () => {
            const editingText = document.querySelector('.el-text[contenteditable="true"]');
            if (editingText) editingText.blur();
            setMode('grab');
        });

        btnImg.addEventListener('click', () => { setMode(null); fileIn.value = ''; fileIn.click(); });
        fileIn.addEventListener('change', e => {
            const f = e.target.files[0]; if (!f) return;
            const reader = new FileReader();
            reader.onload = ev => {
                const [wx, wy] = toWorld(workspace.clientWidth / 2 - 80, workspace.clientHeight / 2 - 80);
                addImage(ev.target.result, wx, wy);
                pushHistory();
            };
            reader.readAsDataURL(f);
            fileIn.value = '';
            showHint('Drag to move • 2-finger pinch to resize');
        });

        function addDelBtn(parent) {
            const btn = document.createElement('div');
            btn.className = 'del-btn'; btn.textContent = '×';
            btn.addEventListener('pointerdown', e => { e.stopPropagation(); parent.remove(); setTimeout(pushHistory, 50); });
            parent.appendChild(btn);
        }

        function addText(sx, sy) {
            const [wx, wy] = toWorld(sx, sy);
            const el = document.createElement('div');
            el.className = 'el el-text editing';
            el.contentEditable = 'true';
            el.style.left = wx + 'px'; el.style.top = wy + 'px';
            el.style.fontSize = '18px'; el.style.zIndex = ++zTop;
            addDelBtn(el);
            layer.appendChild(el);
            doneBtn.classList.add('show');

            setTimeout(() => {
                el.focus();
                const range = document.createRange();
                range.selectNodeContents(el); range.collapse(false);
                const sel = window.getSelection();
                sel.removeAllRanges(); sel.addRange(range);
            }, 80);

            function finishEdit() {
                el.contentEditable = 'false';
                el.classList.remove('editing');
                doneBtn.classList.remove('show');
                if (!el.textContent.trim()) { el.remove(); pushHistory(); return; }
                makeDraggable(el); makePinchFontResize(el); pushHistory();
            }

            el.addEventListener('blur', finishEdit);
            el.addEventListener('keydown', ev => { if (ev.key === 'Escape') el.blur(); });

            let lastTap = 0;
            el.addEventListener('touchend', () => {
                const now = Date.now();
                if (now - lastTap < 320) { el.contentEditable = 'true'; el.classList.add('editing'); el.style.zIndex = ++zTop; doneBtn.classList.add('show'); setTimeout(() => el.focus(), 30); }
                lastTap = now;
            });
            el.addEventListener('dblclick', () => { el.contentEditable = 'true'; el.classList.add('editing'); el.style.zIndex = ++zTop; doneBtn.classList.add('show'); el.focus(); });
        }

        function makePinchFontResize(el) {
            const tPtrs = {};
            let pinchStartDist = null, pinchStartSize = null;
            function tDist() { const pts = Object.values(tPtrs); if (pts.length < 2) return null; return Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y); }
            el.addEventListener('pointerdown', e => {
                tPtrs[e.pointerId] = { x: e.clientX, y: e.clientY };
                if (Object.keys(tPtrs).length === 2) { e.stopPropagation(); pinchStartDist = tDist(); pinchStartSize = parseFloat(el.style.fontSize) || 18; }
            });
            el.addEventListener('pointermove', e => {
                if (!(e.pointerId in tPtrs)) return;
                tPtrs[e.pointerId] = { x: e.clientX, y: e.clientY };
                if (Object.keys(tPtrs).length >= 2 && pinchStartDist) { e.stopPropagation(); e.preventDefault(); el.style.fontSize = Math.max(8, Math.min(120, pinchStartSize * tDist() / pinchStartDist)) + 'px'; }
            }, { passive: false });
            function endTPinch(e) { delete tPtrs[e.pointerId]; if (Object.keys(tPtrs).length < 2) pinchStartDist = null; }
            el.addEventListener('pointerup', endTPinch); el.addEventListener('pointercancel', endTPinch);
        }

        function addImage(url, wx, wy, w, h) {
            const wrap = document.createElement('div');
            wrap.className = 'el el-img';
            wrap.style.left = wx + 'px'; wrap.style.top = wy + 'px'; wrap.style.zIndex = ++zTop;
            const img = document.createElement('img');
            img.src = url; img.draggable = false;
            if (w) { img.style.width = w; img.style.maxWidth = 'none'; }
            if (h) { img.style.height = h; img.style.maxHeight = 'none'; }
            wrap.appendChild(img); addDelBtn(wrap); layer.appendChild(wrap);
            makeDraggable(wrap); makeImgPinchResize(wrap, img);
        }

        function makeDraggable(el) {
            let pid = null, sx, sy, ox, oy;
            el.addEventListener('pointerdown', e => {
                if (e.target.classList.contains('del-btn')) return;
                if (el.contentEditable === 'true') return;
                e.stopPropagation(); el.classList.add('selected');
                pid = e.pointerId; el.setPointerCapture(pid);
                sx = e.clientX; sy = e.clientY;
                ox = parseFloat(el.style.left) || 0; oy = parseFloat(el.style.top) || 0;
                el.style.zIndex = ++zTop;
            });
            el.addEventListener('pointermove', e => { if (e.pointerId !== pid) return; e.stopPropagation(); el.style.left = (ox + e.clientX - sx) + 'px'; el.style.top = (oy + e.clientY - sy) + 'px'; });
            el.addEventListener('pointerup', e => { if (e.pointerId === pid) pid = null; });
            el.addEventListener('pointercancel', () => { pid = null; });
        }

        function makeImgPinchResize(wrap, img) {
            const iPtrs = {}; let pinchStartDist = null, pinchStartW = null, pinchStartH = null;
            function iDist() { const pts = Object.values(iPtrs); if (pts.length < 2) return null; return Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y); }
            wrap.addEventListener('pointerdown', e => {
                iPtrs[e.pointerId] = { x: e.clientX, y: e.clientY };
                if (Object.keys(iPtrs).length === 2) { e.stopPropagation(); pinchStartDist = iDist(); pinchStartW = img.offsetWidth; pinchStartH = img.offsetHeight; }
            });
            wrap.addEventListener('pointermove', e => {
                if (!(e.pointerId in iPtrs)) return;
                iPtrs[e.pointerId] = { x: e.clientX, y: e.clientY };
                if (Object.keys(iPtrs).length >= 2 && pinchStartDist) { e.stopPropagation(); e.preventDefault(); const scale = iDist() / pinchStartDist; img.style.width = Math.max(40, pinchStartW * scale) + 'px'; img.style.height = Math.max(40, pinchStartH * scale) + 'px'; img.style.maxWidth = img.style.maxHeight = 'none'; }
            }, { passive: false });
            function endIPinch(e) { delete iPtrs[e.pointerId]; if (Object.keys(iPtrs).length < 2) pinchStartDist = null; }
            wrap.addEventListener('pointerup', endIPinch); wrap.addEventListener('pointercancel', endIPinch);
        }

        // ═══════════════════════════════════════
        // SNAPSHOT HELPERS
        // ═══════════════════════════════════════
        function snapshotEls() {
            const els = [];
            layer.querySelectorAll('.el').forEach(el => {
                if (el.classList.contains('el-text')) {
                    els.push({ type: 'text', x: parseFloat(el.style.left) || 0, y: parseFloat(el.style.top) || 0, fontSize: el.style.fontSize || '18px', color: el.style.color || '#111', content: el.innerText });
                } else if (el.classList.contains('el-img')) {
                    const img = el.querySelector('img');
                    if (!img) return;
                    if (!img.src.startsWith('data:')) return;
                    els.push({ type: 'image', x: parseFloat(el.style.left) || 0, y: parseFloat(el.style.top) || 0, w: img.style.width || img.offsetWidth + 'px', h: img.style.height || '', src: img.src });
                }
            });
            return { strokes: JSON.parse(JSON.stringify(strokes)), panY, els };
        }

        function restoreSnapshot(snap) {
            // restore strokes
            strokes.length = 0;
            snap.strokes.forEach(s => strokes.push(s));

            // restore pan
            if (typeof snap.panY === 'number') {
                panX = 0; panY = snap.panY;
                layer.style.transform = `translate(0px,${panY}px)`;
                panInfo.textContent = `↓ ${Math.round(-panY)}px`;
            }

            // restore elements
            layer.innerHTML = '';
            snap.els.forEach(d => {
                if (d.type === 'text') {
                    const el = document.createElement('div');
                    el.className = 'el el-text';
                    el.style.left = d.x + 'px'; el.style.top = d.y + 'px';
                    el.style.fontSize = d.fontSize || '18px'; el.style.color = d.color || '#111';
                    el.innerText = d.content; el.contentEditable = 'false'; el.style.zIndex = ++zTop;
                    addDelBtn(el); layer.appendChild(el);
                    makeDraggable(el); makePinchFontResize(el);
                    let lastTap = 0;
                    el.addEventListener('touchend', () => { const now = Date.now(); if (now - lastTap < 320) openTextEdit(el); lastTap = now; });
                    el.addEventListener('dblclick', () => openTextEdit(el));
                } else if (d.type === 'image') {
                    addImage(d.src, d.x, d.y, d.w, d.h);
                }
            });
            redrawAll(); drawGrid(); drawSelection();
        }

        // ═══════════════════════════════════════
        // UNDO / REDO
        // ═══════════════════════════════════════
        const MAX_HISTORY = 50;
        let history = [];
        let historyIdx = -1;

        function pushHistory() {
            // drop any redo states ahead
            history = history.slice(0, historyIdx + 1);
            history.push(snapshotEls());
            if (history.length > MAX_HISTORY) history.shift();
            historyIdx = history.length - 1;
            updateUndoRedo();
            autoSave();
        }

        function undo() {
            if (historyIdx <= 0) return;
            historyIdx--;
            restoreSnapshot(history[historyIdx]);
            updateUndoRedo();
            autoSave();
        }

        function redo() {
            if (historyIdx >= history.length - 1) return;
            historyIdx++;
            restoreSnapshot(history[historyIdx]);
            updateUndoRedo();
            autoSave();
        }

        function updateUndoRedo() {
            btnUndo.disabled = historyIdx <= 0;
            btnRedo.disabled = historyIdx >= history.length - 1;
        }

        btnUndo.addEventListener('click', undo);
        btnRedo.addEventListener('click', redo);

        // ═══════════════════════════════════════
        // INDEXEDDB  SAVE / LOAD
        // ═══════════════════════════════════════
        const DB_NAME = 'longg_db';
        const DB_VER = 1;
        const STORE = 'canvas';
        const RECORD = 'state';
        let db = null;

        function openDB() {
            return new Promise((res, rej) => {
                const req = indexedDB.open(DB_NAME, DB_VER);
                req.onupgradeneeded = e => {
                    e.target.result.createObjectStore(STORE);
                };
                req.onsuccess = e => { db = e.target.result; res(db); };
                req.onerror = e => rej(e.target.error);
            });
        }

        let saveTimer = null;
        function autoSave() {
            clearTimeout(saveTimer);
            autosaveDot.className = 'saving';
            saveTimer = setTimeout(() => {
                saveAll().then(() => {
                    autosaveDot.className = 'saved';
                    setTimeout(() => { autosaveDot.className = ''; }, 1400);
                });
            }, 600);
        }

        function saveAll() {
            if (!db) return Promise.resolve();
            const data = snapshotEls();
            return new Promise((res, rej) => {
                const tx = db.transaction(STORE, 'readwrite');
                tx.objectStore(STORE).put(data, RECORD);
                tx.oncomplete = res;
                tx.onerror = e => { showSaveToast('⚠ Save failed'); rej(e); };
            });
        }

        function loadAll() {
            if (!db) return Promise.resolve();
            return new Promise(res => {
                const tx = db.transaction(STORE, 'readonly');
                const req = tx.objectStore(STORE).get(RECORD);
                req.onsuccess = e => {
                    const data = e.target.result;
                    if (!data) { res(); return; }
                    restoreSnapshot(data);
                    res();
                };
                req.onerror = () => res();
            });
        }

        function openTextEdit(el) {
            el.contentEditable = 'true'; el.classList.add('editing'); el.style.zIndex = ++zTop;
            doneBtn.classList.add('show');
            setTimeout(() => el.focus(), 30);
            el.addEventListener('blur', function onBlur() {
                el.removeEventListener('blur', onBlur);
                el.contentEditable = 'false'; el.classList.remove('editing');
                doneBtn.classList.remove('show');
                if (!el.textContent.trim()) el.remove();
                pushHistory();
            }, { once: true });
        }

        function showSaveToast(msg) {
            clearTimeout(showSaveToast._t);
            saveToast.textContent = msg; saveToast.classList.add('show');
            showSaveToast._t = setTimeout(() => saveToast.classList.remove('show'), 2000);
        }

        // ═══════════════════════════════════════
        // MUSIC POPUP
        // ═══════════════════════════════════════
        const btnMusic = document.getElementById('btn-music');
        const audioIn = document.getElementById('audio-in');
        const bgAudio = document.getElementById('bg-audio');
        const musicPopup = document.getElementById('music-popup');
        const musicOverlay = document.getElementById('music-overlay');
        const musicSongName = document.getElementById('music-song-name');
        const musicSongSub = document.getElementById('music-song-sub');
        const mcPlay = document.getElementById('mc-play');
        const mcPlayIcon = document.getElementById('mc-play-icon');
        const mcPauseIcon = document.getElementById('mc-pause-icon');
        const mcBack = document.getElementById('mc-back');
        const mcFwd = document.getElementById('mc-fwd');
        const musicProgress = document.getElementById('music-progress');
        const musicCur = document.getElementById('music-cur');
        const musicDur = document.getElementById('music-dur');
        const maChange = document.getElementById('ma-change');
        const maRemove = document.getElementById('ma-remove');
        let currentSongName = '';

        function fmtTime(s) {
            if (!isFinite(s)) return '0:00';
            const m = Math.floor(s / 60), ss = Math.floor(s % 60);
            return m + ':' + String(ss).padStart(2, '0');
        }

        function setPlayState(playing) {
            mcPlayIcon.style.display = playing ? 'none' : 'block';
            mcPauseIcon.style.display = playing ? 'block' : 'none';
        }

        function loadAudio(src, name) {
            bgAudio.src = src;
            currentSongName = name || 'Song';
            musicSongName.textContent = currentSongName;
            musicSongSub.textContent = 'Loaded';
            btnMusic.classList.add('has-song');
            bgAudio.play().then(() => setPlayState(true)).catch(() => setPlayState(false));
        }

        function openMusicPopup() { musicPopup.classList.add('show'); }
        function closeMusicPopup() { musicPopup.classList.remove('show'); }

        btnMusic.addEventListener('click', openMusicPopup);
        musicOverlay.addEventListener('click', closeMusicPopup);
        document.querySelector('.music-handle').addEventListener('click', closeMusicPopup);

        mcPlay.addEventListener('click', () => {
            if (bgAudio.paused) bgAudio.play().then(() => setPlayState(true));
            else { bgAudio.pause(); setPlayState(false); }
        });

        mcBack.addEventListener('click', () => { bgAudio.currentTime = Math.max(0, bgAudio.currentTime - 10); });
        mcFwd.addEventListener('click', () => { bgAudio.currentTime = Math.min(bgAudio.duration || 0, bgAudio.currentTime + 10); });

        bgAudio.addEventListener('play', () => setPlayState(true));
        bgAudio.addEventListener('pause', () => setPlayState(false));
        bgAudio.addEventListener('timeupdate', () => {
            const cur = bgAudio.currentTime, dur = bgAudio.duration || 0;
            musicCur.textContent = fmtTime(cur);
            musicDur.textContent = fmtTime(dur);
            if (dur) musicProgress.value = (cur / dur) * 100;
        });
        bgAudio.addEventListener('loadedmetadata', () => {
            musicDur.textContent = fmtTime(bgAudio.duration);
            musicSongSub.textContent = fmtTime(bgAudio.duration);
        });

        musicProgress.addEventListener('input', () => {
            if (bgAudio.duration) bgAudio.currentTime = (musicProgress.value / 100) * bgAudio.duration;
        });

        maChange.addEventListener('click', () => { audioIn.value = ''; audioIn.click(); });

        maRemove.addEventListener('click', () => {
            bgAudio.pause(); bgAudio.src = '';
            currentSongName = '';
            musicSongName.textContent = 'No song loaded';
            musicSongSub.textContent = 'Tap "Change song" to pick one';
            musicProgress.value = 0;
            musicCur.textContent = '0:00'; musicDur.textContent = '0:00';
            setPlayState(false);
            btnMusic.classList.remove('has-song');
            closeMusicPopup();
            if (db) try { const tx = db.transaction(STORE, 'readwrite'); tx.objectStore(STORE).delete('audio_track'); } catch (e) { }
        });

        audioIn.addEventListener('change', e => {
            const f = e.target.files[0]; if (!f) return;
            const reader = new FileReader();
            reader.onload = ev => {
                const src = ev.target.result;
                const name = f.name.replace(/\.[^/.]+$/, '');
                loadAudio(src, name);
                if (db) try { const tx = db.transaction(STORE, 'readwrite'); tx.objectStore(STORE).put({ src, name }, 'audio_track'); } catch (e) { }
            };
            reader.readAsDataURL(f);
            audioIn.value = '';
        });

        function loadSavedAudio() {
            if (!db) return;
            try {
                const tx = db.transaction(STORE, 'readonly');
                const req = tx.objectStore(STORE).get('audio_track');
                req.onsuccess = e => { const d = e.target.result; if (d && d.src) loadAudio(d.src, d.name); };
            } catch (e) { }
        }

        // ═══════════════════════════════════════
        // INIT
        // ═══════════════════════════════════════
        layer.style.transform = 'translate(0px,0px)';
        resizeCanvases();
        updateUndoRedo();
        openDB().then(() => {
            return loadAll();
        }).then(() => {
            history = [snapshotEls()];
            historyIdx = 0;
            updateUndoRedo();
            loadSavedAudio();
        }).catch(err => {
            console.warn('IndexedDB error:', err);
        });
        showHint('Drag to scroll • Draw • Add text & images');
    </script>
</body>

</html>
